{% extends "base.html" %}

{% block titulo %}
    {{ block.super }} - Link para cadastro de clientes
{% endblock titulo %}

{% block conteudo %}
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="nav-align-top">
    <ul class="nav nav-pills" role="tablist" style="margin-left: auto">
      <li class="nav-item" role="presentation">
        <a href="{% url 'fotoflow:cliente_add' %}" class="btn btn-success pull-right">Cadastrar</a>
      </li>
    </ul>
  </div>
</div>
<div class="container-xxl flex-grow-1 container-p-y">
  <div class="card">
    <h5 class="card-header">
      Envie esse link para seus clientes:

    </h5>
    <div class="table-responsive text-nowrap">
      <table class="table table-hover">
        <tbody class="table-border-bottom-0">
          <tr>
            <td>
              <h2>Link gerado com sucesso!</h2>
              <p>Envie este link para seu cliente:</p>
              <p><a href="{{ link }}">{{ link }}</a></p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock conteudo %}
